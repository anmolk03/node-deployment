apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
  namespace: application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
      - name: node-app
        image: registrydemo1.azurecr.io/node:25
        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        env:
        - name: DBHOST
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: DBHOST

        - name: DBUSERNAME
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: DBUSERNAME

        - name: DBUSERNAME
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: DBPASSWORD

        - name: DBNAME
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: DBNAME

        - name: DBDIALECT
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: DBDIALECT
